<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STONEWORKS</title>

  <!-- Kings header font (from index3) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400&family=Kings&display=swap" rel="stylesheet">

  <!-- New stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>
  <div class="container">
    <div class="bg-crystal" aria-hidden="true">
      <model-viewer
        src="images/xtal.glb"
        alt=""
        camera-controls
        auto-rotate
        rotation-per-second="-33deg"
        interaction-prompt="none"
        disable-zoom
        autoplay
        exposure="1.05"
        shadow-intensity="0.4"
      ></model-viewer>
    </div>

    <div class="page-foreground">
      <div class="page-top">
        <div class="header-row">
          <button
            id="audio-toggle"
            type="button"
            aria-label="Toggle audio"
            aria-pressed="false"
            title="Enable audio"
          >
            🔇
          </button>
        </div>

        <div class="title">
          <div>
            <span class="letter">s</span>
            <span class="letter">t</span>
            <span class="letter">o</span>
            <span class="letter">n</span>
            <span class="letter">e</span>
            <span class="letter">w</span>
            <span class="letter">o</span>
            <span class="letter">r</span>
            <span class="letter">k</span>
            <span class="letter">s</span>
          </div>
        </div>

        <p class="hint">
          Unmute and hover over “stoneworks” to play.
        </p>

        <div class="top-nav">
          <a href="music.html" class="nav-link">Music</a>
          <a href="tv.html" class="nav-link">TV</a>
          <a href="https://reverb.com/shop/blue-labs" class="nav-link" rel="noopener noreferrer">Shop</a>
          <a href="about/" class="nav-link">About</a>
        </div>
      </div>
    </div>
  </div>

  <script src="page-transitions.js"></script>
  <script>
    (() => {
      // ---------- DOM ----------
      const letters = Array.from(document.querySelectorAll('.letter'));
      const audioToggle = document.getElementById('audio-toggle');
      const navLinks = Array.from(document.querySelectorAll('.nav-link'));
      if (!letters.length) return;

      // ---------- Musical settings ----------
      // E minor pentatonic (down an octave): E3 G3 A3 B3 D4
      const scale = [164.815, 196.0, 220.0, 246.94, 293.665];

      // Harmony intervals in semitones (always on): 0, +7, +12
      const enabledSemitones = new Set([0, 7, 12]);
      const ratio = (s) => Math.pow(2, s / 12);

      // ---------- Audio (lightweight: NO convolver reverb) ----------
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      let ctx, master, delay, feedback;
      let audioEnabled = false;

      function setAudioUI(enabled) {
        audioEnabled = enabled;
        if (!audioToggle) return;
        audioToggle.textContent = enabled ? '🔈' : '🔇';
        audioToggle.setAttribute('aria-pressed', enabled ? 'true' : 'false');
        audioToggle.title = enabled ? 'Disable audio' : 'Enable audio';
      }

      function ensureAudio() {
        if (ctx) return;

        ctx = new AudioContext();

        master = ctx.createGain();
        master.gain.value = 0.6;

        // small delay "tail"
        delay = ctx.createDelay(0.6);
        delay.delayTime.value = 0.14;

        feedback = ctx.createGain();
        feedback.gain.value = 0.18;

        // feedback loop: delay -> feedback -> delay
        delay.connect(feedback);
        feedback.connect(delay);

        // dry + wet both to master
        delay.connect(master);
        master.connect(ctx.destination);
      }

      async function toggleAudio() {
        try {
          if (!audioEnabled) {
            ensureAudio();
            if (ctx.state !== 'running') await ctx.resume();
            setAudioUI(true);
          } else {
            setAudioUI(false);
          }
        } catch (e) {
          console.error(e);
          setAudioUI(false);
        }
      }

      setAudioUI(false);
      audioToggle?.addEventListener('click', toggleAudio);

      // ---------- Play a note for letters (cheap) ----------
      // Safety: cap voices so harmonies can't explode CPU
      const MAX_VOICES = 3;

      function ping(freq) {
        if (!audioEnabled) return;
        ensureAudio();
        if (ctx.state !== 'running') return;

        const t = ctx.currentTime;

        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;

        const amp = ctx.createGain();
        amp.gain.setValueAtTime(0.0001, t);
        // Slightly higher peak and longer decay for more sustain
        amp.gain.exponentialRampToValueAtTime(0.12, t + 0.02);
        amp.gain.exponentialRampToValueAtTime(0.0001, t + 1.25);

        // route: dry
        osc.connect(amp);
        amp.connect(master);

        // route: wet (delay tail)
        amp.connect(delay);

        osc.start(t);
        osc.stop(t + 1.3);
      }

      // ---------- Percussive button sounds (square waves in-key, filtered + compressed) ----------
      function drumHit(rootIndex, octaveOffset = 0) {
        if (!audioEnabled) return;
        ensureAudio();
        if (!ctx || ctx.state !== 'running') return;

        const t = ctx.currentTime;
        const root = scale[rootIndex % scale.length] * Math.pow(2, octaveOffset);
        const base = root / 2; // one octave below chosen chime note
        const intervals = [0, -7, -12]; // base, -7 semitones, -12 from base

        intervals.forEach((semi) => {
          const osc = ctx.createOscillator();
          osc.type = 'square';
          osc.frequency.value = base * ratio(semi);

          const filter = ctx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(1400, t);
          filter.Q.setValueAtTime(8, t); // added resonance

          const compressor = ctx.createDynamicsCompressor();
          compressor.threshold.setValueAtTime(-24, t);
          compressor.knee.setValueAtTime(18, t);
          compressor.ratio.setValueAtTime(6, t);
          compressor.attack.setValueAtTime(0.006, t);
          compressor.release.setValueAtTime(0.15, t);

          const amp = ctx.createGain();
          amp.gain.setValueAtTime(0.0001, t);
          amp.gain.exponentialRampToValueAtTime(0.18, t + 0.01);
          amp.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);

          // osc -> filter -> compressor -> amp -> master
          osc.connect(filter);
          filter.connect(compressor);
          compressor.connect(amp);
          amp.connect(master);

          osc.start(t);
          osc.stop(t + 0.36);
        });
      }

      function bounceNav(el) {
        el.classList.remove('nav-bounce');
        // force reflow
        void el.offsetWidth;
        el.classList.add('nav-bounce');
      }

      navLinks.forEach((link) => {
        const label = (link.textContent || '').trim().toLowerCase();
        link.addEventListener('mouseenter', () => {
          if (!audioEnabled) return;

          // Map buttons to first four notes of the pentatonic minor scale
          // (indices 0–3 of the existing scale array)
          if (label === 'music') {
            drumHit(0);                              // scale[0]
          } else if (label === 'tv') {
            drumHit(1);                              // scale[1]
          } else if (label === 'shop') {
            drumHit(3);                              // scale[2]
          } else if (label === 'about') {
            drumHit(4);                              // scale[3]
          }

          bounceNav(link);
        });
      });

      // ---------- Letter hover ----------
      letters.forEach((el, i) => {
        el.addEventListener('mouseenter', () => {
          // debounce jitter
          const now = performance.now();
          const last = Number(el.dataset.lastPing || 0);
          if (now - last < 60) return;
          el.dataset.lastPing = String(now);

          const base = scale[i % scale.length] * (i >= 5 ? 2 : 1);

          // play base + up to 2 harmony notes (cap voices)
          const semis = Array.from(enabledSemitones).slice(0, MAX_VOICES);
          semis.forEach((s) => ping(base * ratio(s)));
        });
      });

      // ---------- Demo (visual only) ----------
      async function demoStrikeVisualOnly() {
        for (let i = 0; i < letters.length; i++) {
          const el = letters[i];
          el.classList.remove('is-demo');
          void el.offsetWidth;
          el.classList.add('is-demo');
          setTimeout(() => el.classList.remove('is-demo'), 900);
          await new Promise((r) => setTimeout(r, 70));
        }
      }

      demoStrikeVisualOnly();

      // wiggle the audio toggle once after 1s (visual hint)
      setTimeout(() => {
        if (!audioToggle) return;
        audioToggle.classList.remove('wiggle');
        void audioToggle.offsetWidth;
        audioToggle.classList.add('wiggle');
      }, 1000);
    })();
  </script>
</body>
</html>
